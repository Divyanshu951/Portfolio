<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Divyanshu - Coming Soon</title>
    <meta
      name="description"
      content="Divyanshu's portfolio - live soon. Developer and creator."
    />

    <link rel="icon" type="image/x-icon" href="img/icons8-portfolio-64.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      /* ── Seamless Light / Dark Theme Tokens ── */
      :root {
        --bg: #f9f8f6; /* Alabaster off-white */
        --text-main: #1c1917; /* Stone 900 */
        --text-muted: #57534e; /* Stone 600 */
        --border-color: rgba(28, 25, 23, 0.12);
        --btn-hover: #1c1917;
        --btn-hover-text: #f9f8f6;
        --vignette-start: rgba(249, 248, 246, 0);
        --vignette-end: rgba(249, 248, 246, 1);
        --noise-opacity: 0.04;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0b0e14; /* Deep, sleek midnight */
          --text-main: #f2f5f8;
          --text-muted: #9ba4b5;
          --border-color: rgba(242, 245, 248, 0.15);
          --btn-hover: #f2f5f8;
          --btn-hover-text: #0b0e14;
          --vignette-start: rgba(11, 14, 20, 0);
          --vignette-end: rgba(11, 14, 20, 1);
          --noise-opacity: 0.06;
        }
      }

      /* ── Reset & Typography ── */
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        color: var(--text-main);
        background: var(--bg);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        margin: 0;
        padding: 0;
        height: 100vh;
        overflow: hidden; /* Prevent body scroll */
      }

      /* ── Layout ── */
      .layout {
        display: flex;
        height: 100vh;
        height: calc(
          var(--vh, 1vh) * 100
        ); /* Use viewport height exact variable */
        width: 100vw;
        overflow: hidden;
      }

      /* ── Visual Section (Left) ── */
      .visual {
        flex: 1.1;
        position: relative;
        overflow: hidden;
      }

      .visual img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: 50% 30%; /* Keeps faces/skies well-framed when cropped */
        transform: scale(1.04);
        animation: slowPan 35s alternate infinite ease-in-out;
      }

      @keyframes slowPan {
        0% {
          transform: scale(1.04) translate(0%, 0%);
        }
        100% {
          transform: scale(1.08) translate(-1.5%, 1.5%);
        }
      }

      /* Gradient overlay to seamlessly blend into the content section */
      .visual::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to right,
          var(--vignette-start) 75%,
          var(--vignette-end) 100%
        );
        pointer-events: none;
      }

      /* ── Content Section (Right) ── */
      .content {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 4rem 8%;
        background: var(--bg);
        position: relative;
        z-index: 1;
      }

      @media (min-width: 1400px) {
        .content {
          padding: 4rem 10%;
        }
      }

      /* Subtle Film Grain Noise Overlay */
      .content::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        opacity: var(--noise-opacity);
        pointer-events: none;
        z-index: -1;
      }

      .content-inner {
        width: 100%;
        max-width: 460px;
      }

      /* ── Staggered Entrance Animations ── */
      .fade-up {
        opacity: 0;
        transform: translateY(24px);
        animation: fadeUpAnim 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      .d-1 {
        animation-delay: 0.1s;
      }
      .d-2 {
        animation-delay: 0.3s;
      }
      .d-3 {
        animation-delay: 0.5s;
      }
      .d-4 {
        animation-delay: 0.7s;
      }
      .d-5 {
        animation-delay: 0.9s;
      }

      @keyframes fadeUpAnim {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ── Content Elements ── */
      .eyebrow {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.25em;
        font-weight: 500;
        color: var(--text-muted);
        margin-bottom: 2rem;
        display: flex;
        align-items: center;
        gap: 1.25rem;
      }

      .eyebrow::before {
        content: "";
        width: 38px;
        height: 1px;
        background: var(--text-muted);
      }

      .title {
        font-family: "Playfair Display", serif;
        font-size: clamp(3.2rem, 5vw, 4.8rem);
        font-weight: 500;
        line-height: 1.05;
        margin-bottom: 1rem;
        color: var(--text-main);
        letter-spacing: -0.01em;
      }

      .title span {
        display: block;
        font-style: italic;
        color: var(--text-muted);
        font-size: 0.9em;
        margin-top: 0.1em;
      }

      .description {
        margin-top: 2.5rem;
        font-size: 1.05rem;
        line-height: 1.8;
        color: var(--text-muted);
      }

      /* ── Social Links ── */
      .social-links {
        margin-top: 3.5rem;
        display: flex;
        gap: 1.2rem;
      }

      .social-link {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        border: 1px solid var(--border-color);
        display: flex;
        justify-content: center;
        align-items: center;
        color: var(--text-main);
        text-decoration: none;
        font-size: 1.2rem;
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        position: relative;
        overflow: hidden;
        background: transparent;
        z-index: 10;
      }

      .social-link::before {
        content: "";
        position: absolute;
        inset: 0;
        background: var(--btn-hover);
        border-radius: 50%;
        transform: scale(0);
        transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        z-index: -1;
      }

      /* Slight magnetic float lift and border color change */
      .social-link:hover {
        color: var(--btn-hover-text);
        border-color: var(--btn-hover);
        transform: translateY(-4px);
      }

      .social-link:hover::before {
        transform: scale(1);
      }

      /* ── Footer ── */
      .footer {
        margin-top: 6rem;
        font-size: 0.75rem;
        color: var(--text-muted);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      /* ── Responsive Styling ── */
      @media (max-width: 900px) {
        .layout {
          flex-direction: column;
        }
        .visual {
          flex: none;
          height: 52vh;
          width: 100%;
        }
        .visual::after {
          background: linear-gradient(
            to bottom,
            var(--vignette-start) 65%,
            var(--vignette-end) 100%
          );
        }
        .content {
          padding: 2rem 2.5rem 5rem;
          align-items: center;
          text-align: center;
        }
        .eyebrow {
          justify-content: center;
        }
        .eyebrow::after {
          content: "";
          width: 38px;
          height: 1px;
          background: var(--text-muted);
        }
        .description {
          margin: 2rem auto 0;
          font-size: 1rem;
        }
        .social-links {
          justify-content: center;
        }
        .footer {
          margin-top: 4rem;
        }
      }

      @media (max-width: 480px) {
        .title {
          font-size: clamp(2.8rem, 12vw, 3.8rem);
        }
        .visual {
          height: 48vh;
        }
        .social-link {
          width: 48px;
          height: 48px;
          font-size: 1.1rem;
        }
        .content {
          padding: 1.5rem 1.75rem 4rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <!-- Visual / Artwork Pane -->
      <div class="visual">
        <img src="img/hero.jpeg" alt="Divyanshu - Character Illustration" />
      </div>

      <!-- Content / Typography Pane -->
      <div class="content">
        <div class="content-inner">
          <div class="eyebrow fade-up d-1">Divyanshu</div>

          <h1 class="title fade-up d-2">Coming <br /><span>Soon.</span></h1>

          <p class="description fade-up d-3">
            My new website will be live soon. In the meantime, feel free to
            connect with me across the web. The journey starts shortly.
          </p>

          <div class="social-links fade-up d-4">
            <a
              href="https://x.com/usualTechNerd"
              class="social-link"
              target="_blank"
              aria-label="X (Twitter)"
            >
              𝕏
            </a>
            <a
              href="https://hashnode.com/@divyanshu951"
              target="_blank"
              rel="noopener noreferrer"
              class="social-link"
              aria-label="HashNode (Blogs)"
            >
              <i class="fa-brands fa-hashnode"></i>
            </a>
            <a
              href="https://www.linkedin.com/in/divyanshu-357240165/"
              target="_blank"
              rel="noopener noreferrer"
              class="social-link"
              aria-label="LinkedIn"
            >
              <i class="fa-brands fa-linkedin-in"></i>
            </a>
            <a
              href="https://github.com/Divyanshu951"
              target="_blank"
              rel="noopener noreferrer"
              class="social-link"
              aria-label="GitHub"
            >
              <i class="fa-brands fa-github"></i>
            </a>
          </div>

          <div class="footer fade-up d-5">
            &copy; <span id="year"></span> Divyanshu
          </div>
        </div>
      </div>
    </div>

    <script>
      // Autofill the current year in footer
      document.getElementById("year").textContent = new Date().getFullYear();

      // Ensure mobile viewports handle 100vh correctly with address bars
      function setVH() {
        let vh = window.innerHeight * 0.01;
        document.documentElement.style.setProperty("--vh", `${vh}px`);
      }
      window.addEventListener("resize", setVH);
      setVH();
    </script>
  </body>
</html>
